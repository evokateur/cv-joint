    <meta name="description" property="og:description" content="Description: Job Description Summary: The Circulation Technician - Temporary provides weekday and weekend staff coverage for the library circulation desk. Performs routine clerical and technical tasks under the supervision of full-time library staff. Duties and Responsibilities: Perform ILL duties (includes requests for document delivery and electronic searches; records statistics on library usage.) Provide routine check-in and check-out of items using manual and automated systems and respond to simple information requests from patrons at the circulation desk. Assist patrons in using library catalog, and audiovisual systems. Do routine technical troubleshooting. Perform all acquisitions duties (including ordering books for the library, processing orders, and receiving. Handle and record money transactions for document delivery, copy, cards, and fines. Maintain a neat, functional, and safe library environment. Maintain photocopy machines with paper, toner replacement, and clearance of paper jams. Report problems to the library staff. Process new library materials. Sort and distribute departmental mail. Process material for mailing. Skills and Abilities Knowledge of routine library operations Ability to deal courteously and effectively with the public Must have excellent communication skills and ability to work with diverse groups of people Ability to work with accuracy and great attention to detail Accurate typing and word processing skills Good problem-solving skills Effective troubleshooting with computers, copiers, and printers Excellent literacy skills Education and/or Experience High school diploma or general education (GED) Library experience and/or training, preferably community college level or higher Work Environment: Office Location: Oakland Campus – Onsite This is an onsite position based in Oakland, CA, requiring regular in-office presence to support daily operations, collaboration, and student or team engagement. Work is performed primarily on campus in a dynamic academic environment, with direct interaction across multidisciplinary teams. Employee Status: Temporary Exemption Status: United States of America (Non-Exempt) Time Type: Full time Job Shift: Pay Range: Up to $29.00 [hourly/non exempt], depending on experience, qualifications, geographic location, and other relevant factors. Samuel Merritt University currently provides base salary ranges for all positions-on job advertisements-in the United States based on local requirements. Individual compensation will ultimately be determined based on a variety of relevant factors including but-not limited to qualifications, geographic location, and other relevant skills. SMU is a health sciences institution offering high-quality instruction, outstanding faculty, and state-of-the-art facilities. We have a deep commitment and proven track record of preparing professionals to address today’s healthcare needs. Our Mission We educate students to become highly skilled and compassionate healthcare professionals who positively transform the experience of care in diverse communities. Our Vision Samuel Merritt University will become nationally recognized as a premier, multi-specialty health sciences institution. Expert faculty and staff will shape an inclusive learning environment where all students experience best teaching practices and state-of-the-art learning approaches. The University will select and support students who will flourish in the rigorous academic programs, learn to practice expertly, and pass licensure or certifications examinations on their first attempt. Our Philosophy of Teaching and Learning We see faculty and students as partners in the teaching and learning process. Our programs, curricula, and courses are designed to encourage active, experiential learning as well as collegial, scholarly, and effective communications. We believe that clinical and practical applications, including interprofessional education, provide a critical foundation for learning in the health professions. SMU graduates use sound reasoning, evidence-based care, and clinical expertise to respond to the needs of the people they serve. Community and Diversity We&#39;re more than a top health professions university. SMU is committed to training students in the importance of social determinants of health and how to care for patients from diverse backgrounds with integrity and compassion. Our Values If you&#39;re interested in transforming the care experience in diverse communities, SMU could be the place for you. SMU students learn to advance health equity and make a lasting impact on individuals&#39; health and community well-being. At the core of our educational values are hands-on, experiential learning; the promotion of diversity and inclusion; and community-service outreach, locally and globally. We embrace: A learning environment where we challenge ourselves and our students to think critically, seek mastery, and act compassionately A collegial environment where we are fair, respectful, and behave with integrity A collaborative environment where we partner with one another and with others in the community An innovative environment where we take reasoned risks and move nimbly A results-oriented environment where we provide and expect exceptional performance and service The Employee Polygraph Protection Act prohibits most private employers from using lie detector tests either for pre-employment screening or during the course of employment. Details can be found on our website at: https://www.samuelmerritt.edu/employee-polygraph-protection-act">

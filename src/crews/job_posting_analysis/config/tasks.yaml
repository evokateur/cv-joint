job_analysis_task:
  description: >
    Analyze the job posting at {job_posting_url}.

    If a content file is provided ({content_file}), read the content from that local
    file instead of fetching from the URL. The URL is still the canonical source.

    Extract structured information into the JobPosting schema:

    **1. Metadata**
    - Extract job title, company name, industry, and experience level.
    - Extract the narrative description: the prose overview of the role, company, and context. Copy
      it faithfully without summarizing or condensing. Do not include structured sections (skills,
      responsibilities, deliverables, application instructions) — those are captured in dedicated fields.

    **2. Requirements**
    - Extract degrees, certifications, and explicit "years of experience" requirements.
    - Identify hard requirements (licenses, mandatory credentials).

    **3. Skills**
    - Technical skills: programming languages, frameworks, cloud platforms, tools.
    - Soft skills: communication, teamwork, leadership, problem-solving.
    - Preferred skills: "nice-to-have" extras.

    **4. Responsibilities**
    - Bullet out day-to-day tasks, focusing on specific duties (not vague culture blurbs).

    **5. Deliverables**
    - List the concrete outputs or artifacts the employer expects to receive (e.g., "working API
      integration", "technical documentation", "test suite"). These are distinct from
      responsibilities — they are the end results, not the ongoing work.

    **6. ATS Alignment**
    - Tools/tech stack: all specifically named technologies, platforms, and products — including
      third-party SaaS tools, APIs, and named services (e.g., PracticeQ, Bridge, Salesforce, Stripe),
      not just generic infrastructure tech (AWS, Docker, React). If a product or platform is named
      in the posting, it belongs here.
    - Keywords: ATS-relevant terms not already captured in skills, tools, responsibilities, or
      deliverables — domain buzzwords, industry terminology, and important phrases a recruiter
      or ATS might filter on (e.g., "telemedicine", "billing workflow", "HIPAA"). Do not repeat
      terms already present in other fields.

    **7. Application Instructions**
    - Extract each discrete instruction for applicants as a separate list item: required materials,
      questions to answer, secret keywords to include, formatting requirements, etc.
    - Preserve the exact wording of each item — do not paraphrase. These are critical for the
      applicant to follow when submitting a proposal.

    **8. Normalization**
    - Deduplicate terms (merge "Python 3" and "Python").
    - Expand acronyms if possible (e.g., "CI/CD" -> "Continuous Integration / Continuous Deployment").
    - Filter out vague corporate jargon ("fast-paced environment", "great culture").

    Output must be a valid JobPosting object.
  expected_output: >
    A validated JobPosting object with all fields populated where possible,
    ensuring consistency and ATS-awareness.
  agent: job_analyst
